---
- name: Installer les dependances
  apt:
    name:
      - wget
      - gnupg
    state: present
    update_cache: true

- name: Telecharger le repo Zabbix
  get_url:
    url: https://repo.zabbix.com/zabbix/6.4/ubuntu/pool/main/z/zabbix-release/zabbix-release_6.4-1+ubuntu22.04_all.deb
    dest: /tmp/zabbix-release.deb

- name: Installer le repo Zabbix
  apt:
    deb: /tmp/zabbix-release.deb

- name: Mettre a jour apt
  apt:
    update_cache: true

- name: Installer Zabbix Agent
  apt:
    name: zabbix-agent
    state: present

- name: Configurer Server
  lineinfile:
    path: /etc/zabbix/zabbix_agentd.conf
    regexp: "^Server="
    line: "Server=192.168.56.20"

- name: Configurer ServerActive
  lineinfile:
    path: /etc/zabbix/zabbix_agentd.conf
    regexp: "^ServerActive="
    line: "ServerActive=192.168.56.20"

- name: Configurer Hostname
  lineinfile:
    path: /etc/zabbix/zabbix_agentd.conf
    regexp: "^Hostname="
    line: "Hostname={{ inventory_hostname }}"

- name: Demarrer Zabbix Agent
  service:
    name: zabbix-agent
    state: started
    enabled: true
